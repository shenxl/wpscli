personas:
  - name: enterprise-admin
    title: 企业管理员
    description: "负责组织配置、权限治理、目录与协作空间管理。"
    services: [users, depts, groups, drives, workflow]
    workflows:
      - sync-org-to-dbsheet
      - batch-file-upload-and-share
    instructions:
      - "先执行 `wpscli auth status`，确认 app 与 user 凭据都可用。"
      - "组织类接口优先使用 app token。"
      - "涉及文件权限变更前先 dry-run 复核。"
    tips:
      - "定期运行 `wpscli users sync --auth-type app` 保持缓存新鲜。"
      - "权限操作保留审计日志。"

  - name: project-manager
    title: 项目经理
    description: "负责项目计划、会议安排、任务跟踪与状态同步。"
    services: [calendars, meetings, coop_dbsheet, messages, files]
    workflows:
      - create-project-workspace
      - schedule-meeting-with-contacts
      - daily-report-from-calendar
    instructions:
      - "先创建项目工作区，再落任务和文档。"
      - "会议前执行忙闲查询避免冲突。"
      - "更新任务时优先批量操作。"
    tips:
      - "多维表更新统一走 batch。"
      - "对外分享前检查文件权限。"

  - name: hr-coordinator
    title: HR 协调员
    description: "负责员工信息同步、通知与入转调离流程协同。"
    services: [contacts, users, calendars, messages, workflow]
    workflows:
      - sync-org-to-dbsheet
      - cross-chat-broadcast
    instructions:
      - "组织架构查询全部使用 app token。"
      - "批量通知前先抽样验证接收群。"
    tips:
      - "同名员工要二次确认 user_id。"
      - "涉及个人信息场景注意最小化输出。"

  - name: content-creator
    title: 内容创作者
    description: "负责文档生产、知识沉淀和跨群内容分发。"
    services: [documents, files, wiki, doclibs, messages]
    workflows:
      - doc-read-transform-write
      - send-doc-to-chat
    instructions:
      - "先读取原文再做重写，避免事实偏差。"
      - "跨群分发优先发送云文档消息，保持单一事实源。"
    tips:
      - "可结合 `wpscli doc search` 快速定位素材。"
      - "回写前请保留原始版本。"

  - name: sales-ops
    title: 销售运营
    description: "负责客户节奏推进、会议安排、商机与沟通记录沉淀。"
    services: [coop_dbsheet, calendars, meetings, messages, contacts]
    workflows:
      - schedule-meeting-with-contacts
      - search-chat-history
      - daily-report-from-calendar
    instructions:
      - "优先用联系人搜索锁定正确参会人。"
      - "关键会话支持 cookie 模式检索历史上下文。"
    tips:
      - "日报场景固定时间窗口，避免遗漏。"
      - "客户沟通摘要建议落表归档。"

  - name: customer-support
    title: 客服支持
    description: "负责问题检索、会话追踪、跨群同步与处理闭环。"
    services: [messages, chats, coop_dbsheet, todo]
    workflows:
      - search-chat-history
      - cross-chat-broadcast
    instructions:
      - "先全局搜索定位历史上下文，再回复。"
      - "跨群广播只同步结论，不泄露原始隐私内容。"
    tips:
      - "高优问题同步写入 todo 或 dbsheet 追踪。"
      - "对话回放建议限定时间范围。"

  - name: team-lead
    title: 团队主管
    description: "负责团队节奏管理、会议纪要复盘和目标追踪。"
    services: [calendars, meetings, messages, users, coop_dbsheet]
    workflows:
      - analyze-meeting-minutes
      - daily-report-from-calendar
      - create-dbsheet-with-data
    instructions:
      - "每次关键会议后生成纪要并抽取待办。"
      - "任务跟踪建议同步到统一多维表。"
    tips:
      - "会后 24 小时内完成纪要回写。"
      - "周会前先拉取上周关键消息摘要。"
