domains:
  - id: ContentCreation
    title: 内容创作与产出
    description: 面向文档、表格、知识页等内容的新建与编辑产出。
    services:
      - aidocs
      - documents
      - sheets
      - wiki
      - workbench_blocks
      - doclib
      - doclibs

  - id: ContentUnderstanding
    title: 内容理解与解析
    description: 面向文档结构解析、语义理解、标识转换与链接解析。
    services:
      - docqa
      - id_convert
      - links

  - id: DataOps
    title: 数据操作与结构化处理
    description: 面向多维表和结构化数据的增删改查与批处理操作。
    services:
      - dbsheet
      - coop_dbsheet
      - low_code_app
      - drive_tasks

  - id: KnowledgeSearch
    title: 检索与知识发现
    description: 面向消息、会话、联系人等场景的查询检索与定位。
    services:
      - chats
      - messages
      - cookie_im
      - cookie_contacts
      - contacts
      - mail_messages

  - id: CollaborationFlow
    title: 协作流转与共享
    description: 面向文件协作、任务分发、订阅通知与共享流程。
    services:
      - files
      - drives
      - coop_files
      - todo
      - subscription
      - event
      - sse
      - create_workbench_favorite_app
      - get_workbench_favorite_apps
      - remove_workbench_favorite_app

  - id: OrganizationAdmin
    title: 组织管理与治理
    description: 面向组织架构、账号权限、应用管理和目录治理。
    services:
      - users
      - depts
      - groups
      - companies
      - service_principals
      - partners
      - applications
      - developer
      - devhub
      - attendance
      - user_mailboxes
      - public_mailboxes
      - mailboxes

  - id: MeetingCalendar
    title: 会议与日程协同
    description: 面向会议编排、日历事件、忙闲与纪要协同场景。
    services:
      - calendars
      - meetings
      - minutes
      - free_busy_list
      - meeting_rooms
      - meeting_room_banned_users
      - meeting_room_bookings
      - meeting_room_levels
      - meeting_room_privileged_users
      - meeting_room_settings
      - mail_contacts
      - mail_tasks

  - id: PlatformAutomation
    title: 平台自动化与运行支撑
    description: 面向流程自动化、鉴权、运行状态、数据生命周期管理。
    services:
      - automation
      - workflow
      - oauth2
      - misc
      - drive_freq
      - multipart_upload_tasks
      - store
      - announce
      - deleted_files
      - second_deleted_files
      - mail_migrations
